<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>deadlines.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Lora:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="bg-mesh" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--teal" aria-hidden="true"></div>

  <!-- ── Login Screen ───────────────────────────────────────────────── -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-brand">deadlines.</div>
      <p class="login-sub">your calendar , without any extra fuss</p>

      <button class="login-google-btn" id="loginGoogleBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        continue with google
      </button>

      <p class="login-hint">reads your Google Calendar. nothing is stored on any server.</p>
    </div>
  </div>

  <!-- ── Main App (hidden until signed in) ─────────────────────────── -->
  <div class="app-shell" id="appShell" style="display:none">

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settingsOverlay" onclick="closeSettings(event)">
      <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
          <span class="settings-title">preferences</span>
          <button class="icon-btn" onclick="closeSettings()">✕</button>
        </div>

        <div class="settings-section">
          <div class="section-label">google account</div>
          <div id="authSection">
            <div id="signedInInfo" class="signed-in-info">
              <div class="user-pill">
                <div class="user-avatar" id="userAvatar"></div>
                <span id="userName"></span>
                <button class="signout-link" onclick="handleSignOut()">sign out</button>
              </div>
            </div>
          </div>
        </div>

        <div class="settings-section" id="calendarToggleSection" style="display:none">
          <div class="section-label">calendars</div>
          <div id="calendarList" class="calendar-list"></div>
        </div>

        <div class="settings-section">
          <div class="section-label">subject colors</div>
          <div id="subjectColorList" class="subject-color-list"></div>
          <div class="empty-hint" id="colorHint" style="display:none">no subjects yet</div>
        </div>
      </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal-overlay" id="addTaskOverlay" onclick="closeAddTask(event)">
      <div class="add-task-modal">
        <div class="settings-header">
          <span class="settings-title">add task</span>
          <button class="icon-btn" onclick="closeAddTask()">✕</button>
        </div>
        <div class="form-group">
          <label class="form-label">title</label>
          <input type="text" id="taskTitle" class="form-input" placeholder="what's due?" />
        </div>
        <div class="form-group">
          <label class="form-label">date</label>
          <input type="date" id="taskDate" class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label">subject</label>
          <input type="text" id="taskSubject" class="form-input" placeholder="e.g. Physics" />
        </div>
        <button class="add-btn" onclick="saveManualTask()">add task</button>
      </div>
    </div>

    <!-- Main App -->
    <div class="app">
      <!-- Left: Calendar -->
      <div class="left-panel">
        <div class="app-brand">deadlines.</div>

        <div class="calendar-wrap">
          <div class="cal-header">
            <button class="cal-nav" onclick="prevMonth()">‹</button>
            <span class="cal-month" id="calMonth"></span>
            <button class="cal-nav" onclick="nextMonth()">›</button>
          </div>
          <div class="cal-grid">
            <div class="cal-day-name">su</div>
            <div class="cal-day-name">mo</div>
            <div class="cal-day-name">tu</div>
            <div class="cal-day-name">we</div>
            <div class="cal-day-name">th</div>
            <div class="cal-day-name">fr</div>
            <div class="cal-day-name">sa</div>
            <div id="calDays"></div>
          </div>
        </div>

        <button class="gear-btn" onclick="openSettings()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
          preferences
        </button>
      </div>

      <!-- Right: Tasks -->
      <div class="right-panel">
        <div class="glass-header-bar">
          <div class="right-header">
            <div class="date-block">
              <div class="day-label" id="dayLabel"></div>
              <div class="date-display" id="dateDisplay"></div>
            </div>
            <button class="add-task-btn" onclick="openAddTask()">+ add</button>
          </div>
        </div>

        <div class="tasks-glass-wrap">
          <div class="tasks-area" id="tasksArea">
            <div class="empty-state">
              <div class="empty-icon">◎</div>
              <div>nothing scheduled</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /app-shell -->

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="app.js"></script>
</body>

</html>
